seed: 42
device: auto
data_dir: data/v2
output_dir: checkpoints/v2

context_length: 32
batch_size: 48
eval_batch_size: 48
num_workers: 0

epochs: 40
lr: 0.0003
weight_decay: 0.01
grad_clip: 1.0
grad_accum_steps: 1
aux_weight: 0.2
ema_decay: 0.999
early_stop_patience: 8
use_amp: true

model:
  d_model: 384
  nhead: 8
  num_layers: 6
  dim_feedforward: 1024
  dropout: 0.1
  max_len: 1024

